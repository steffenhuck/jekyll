  <div class="preface">
  <p>Being the papers in the case of <b>HENRY JEKYLL</b>, M.D., D.C.L., LL.D., F.R.S., sometime of the square behind the by-street; arranged, after the death of Mr. Utterson his lawyer, by <b>MR. GUEST</b>, head clerk in that office.</p>
  <p>A man’s hand betrays him sooner than his face. I have read every hand in this file — I once compared two of them by my master’s fire, and kept my remark to myself, as clerks do — and I say the file is honest, whatever it is besides. The papers run in order of date, and the dates run one way, like a river under fog.</p>

s1: {

  text: s => `
  <p>The file opens in a doctor’s private cabinet, over an old dissecting theatre, past midnight. Dr. Henry Jekyll: fifty, large, smooth-faced, rich; a name often printed and never but to its credit; a man who has spent half a life hiding the other half. His science — “unscientific balderdash,” says his oldest friend, Dr. Hastie Lanyon, the great physician of Cavendish Square — has hunted one quarry for years: the door between a man’s two natures. “Man is not truly one, but truly two,” says the notebook.</p>
  <p>On the table a graduated glass holds a blood-red tincture; beside it lies a paper of white salt, bought wholesale from Messrs. Maw. Mixed, they will boil, smoke and settle; drunk, they will — if the notebook is right — unseat a soul. The house sleeps. The mixture wants only its last ingredient, which is nerve.</p>`,

  <p>The glass drained, the pangs came, exactly as the confession would one day set them down: “a grinding in the bones, deadly nausea, and a horror of the spirit that cannot be exceeded at the hour of birth or death.” Then, sweetness. The body that got up from the chair was small, light, young; its blood ran wicked, and knew it, and was glad.</p>
  <p>There was no mirror in the cabinet — that came later, and for this very purpose. Out in the yard the constellations looked down on the first creature of the sort their vigilance had yet disclosed to them. The house lay dark; somewhere upstairs hung the glass that could show the new face what it was.</p>`,

  text: s => `
  <p>The road walked back. The second draught restored, in every dimension, Dr. Henry Jekyll — and the weeks following are the busiest in the file. A house is taken in Soho and furnished in good taste; a housekeeper engaged, “a creature whom I knew well to be silent and unscrupulous.” The servants in the square are told that one Mr. Edward Hyde — small, young, difficult to describe — is to have full liberty and power about the place; Poole the butler bows.</p>
  <p>And there is the question of money, which is the question of everything, for a man who does not exist cannot cash a cheque.</p>`,
  choices: s => [

  <p>Its terms: in case of the decease of Henry Jekyll, all he possesses passes to his “friend and benefactor Edward Hyde”; and in case of Dr. Jekyll’s “disappearance or unexplained absence for any period exceeding three calendar months,” the said Hyde steps into the said shoes without delay. A dead man needs no plan; a disappeared man needs a very good one.</p>`,

s9: {

  text: s => `
  <p>Months pass; the double life finds its gait. Then comes a morning, in the decent bedroom in the square, with something wrong in the waking. The bed is right; the mahogany is right; the hand on the counterpane is wrong: “lean, corded, knuckly, of a dusky pallor.” Jekyll lay down; Hyde has risen — unbidden, no draught taken, the first time the thing has moved of itself.</p>
  <p>Dressed small, face down, past Bradshaw the footman (who stares, and draws back), across the court, up to the cabinet and the glass; and ten minutes later the doctor, restored, sits down to make a feint of breakfasting. The confession calls that morning “the Babylonian finger on the wall.” The balance is tipping; the original and better self is losing hold. Something must be resolved, and resolved now.</p>`,

d2: {

  text: s => `
  <p>Sleep decides it. The doctor dozes in his chair after lunch, a fasting man, a whole man — and wakes at noon with the corded hand, in his own house, servants moving on every stair. The dash to the cabinet succeeds; the mirror gets its Jekyll back; but the lesson stands in the confession’s own words: “my devil had been long caged” — and caging, it now appears, is a feeding.</p>

  <p>The file holds a maid-servant’s deposition. She sat at her window over the lane at eleven, the early night cloudless, the lane brilliantly lit by the full moon: “she became aware of an aged beautiful gentleman with white hair, drawing near along the lane; and advancing to meet him, another and very small gentleman.” The old man bows; accosts Mr. Hyde “with a very pretty manner of politeness”; seems, from his pointing, to be only inquiring his way. The moon is on his face as he speaks, and the face is all innocence and old-world kindness.</p>

s11k: {

  <p class="handoff">Here the clerk’s arrangement ends. What follows is the last exhibit, in the doctor’s own script, unabridged.</p>

  <p>At dinner in Cavendish Square, Dr. Lanyon — the great physician, red-faced, boisterous, oldest of the doctor’s friends — calls the whole direction of his work “unscientific balderdash,” and is happy, and orders more wine. It is a long winter. A cabinet keeps its own hours inside a man’s head.</p>`,

    'This is not the ending Stevenson wrote: in the novel the first supply of the salt is never assayed, its impurity never named, and the whole tragedy hangs from a flaw nobody thought to measure. One night’s caution with a scruple of powder, two years before the end, undid the book — Hyde was chemistry after all, and chemistry could be mended.' },

/* ———————— ENGINE ———————— */

const CANON = ['s1','s2','s3','s4','s5','s6','s7','s8','s8b','s9','s10','s11','s11k','s11b',
  's12','s13','s14','s15','s16','s17','s18','s19','s20','s21','s22','s22b','s22c','s23','e1'];

let S;
function reset(){
  S = { flags:{lanyon:false,account:false,assay:false,spared:false,will:false},
        marks:new Set(), canon:new Set(), departures:[] };
  show('title');
}

function val(v){ return (typeof v === 'function') ? v(S) : v; }

function choose(c, node){
  if (c.set) Object.assign(S.flags, c.set);
  if (c.mark) S.marks.add(c.mark);
  if (c.mark2) S.marks.add(c.mark2);
  if (c.dep) S.departures.push({ date: val(node.date) || 'the file’s opening', what: c.dep });
  show(c.to);
}

function finisBlock(node){
  const f = node.finis;
  return `<div class="finis">
    <div class="word">FINIS</div>
    <div class="name">${f.name}</div>
    <div class="verdict">${val(f.verdict)}</div>
  </div>`;
}

function show(id){
  if (id === 'RESET'){ reset(); return; }
  const node = NODES[id];
  if (CANON.includes(id)) S.canon.add(id);
  document.body.classList.toggle('hyde', node.actor === 'hyde');
  const sheet = document.getElementById('sheet');
  let html = '';
  if (node.special === 'title'){
    html += '<div class="runhead">the escapable canon &nbsp;·&nbsp; volume: london, 18—</div>';
    html += val(node.text);
  } else {
    html += '<div class="runhead">the papers in the case</div>';
    const d = val(node.date);
    if (d) html += `<div class="dateline">${d}</div>`;
    html += `<div class="prose">${val(node.text)}</div>`;
  }
  if (node.finis) html += finisBlock(node);
  const choices = node.finis
    ? [{t:'begin again.', to:'RESET', bare:true}]
    : val(node.choices).filter(c => !c.show || c.show(S));
  html += '<div class="choices">' + choices.map((c,i) =>
    `<button class="${c.bare ? 'bare' : ''}" data-i="${i}">${c.t}</button>`).join('') + '</div>';
  sheet.innerHTML = html;
  sheet.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const c = choices[Number(btn.dataset.i)];
      if (c.to === 'RESET'){ reset(); } else { choose(c, node); }
    });
  });
  window.scrollTo(0, 0);
}

reset();
</script>
